{% extends "base.html" %}

{% block title %}Validación de Entes Públicos{% endblock %}

{% block body_class %}inst-body{% endblock %}

{% block content %}

<div class="inst-container">

<h1>Reporte de Códigos de Ética</h1>
<h2>1. Verificación de Entes Públicos</h2>

<div id="tabs">
    <button type="button" data-poder="Ejecutivo" onclick="filtrar('Ejecutivo')">Poder Ejecutivo</button>
    <button type="button" data-poder="Legislativo" onclick="filtrar('Legislativo')">Poder Legislativo</button>
    <button type="button" data-poder="Judicial" onclick="filtrar('Judicial')">Poder Judicial</button>
    <button type="button" data-poder="Autonomo" onclick="filtrar('Autonomo')">Organismos Autónomos</button>
    <button type="button" data-poder="Municipio" onclick="filtrar('Municipio')">Municipios</button>
    <button type="button" data-poder="TODOS" onclick="filtrar('TODOS')">Mostrar todos</button>
    <input
        type="text"
        id="buscador"
        placeholder="Buscar institución..."
        oninput="aplicarFiltros()"
        autocomplete="off"
    >
    <span id="buscador-contador"></span>
</div>

<br>

<form id="formulario-dinamico"></form>

<div id="paginacion" style="display:none; margin: 20px 0; align-items:center; gap:8px; flex-wrap:wrap;">
    <button type="button" id="btn-anterior" onclick="cambiarPagina(-1)">← Anterior</button>
    <span id="paginacion-info" style="font-size:14px; color:#555;"></span>
    <button type="button" id="btn-siguiente" onclick="cambiarPagina(1)">Siguiente →</button>
    <span style="margin-left:16px; font-size:13px; color:#888;">Mostrar
        <select id="por-pagina" onchange="cambiarPorPagina()" style="padding:3px 6px; font-size:13px;">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="9999">Todos</option>
        </select>
        por página
    </span>
</div>

<br>

<button type="button" onclick="window.location.href='/'">
    Volver al inicio
    <img src="{{ url_for('static', filename='assets/icons/arrow_back_24dp.svg')}}">
</button>

<button type="button" onclick="agregarEntrada()">
    Añadir nueva entrada
    <img src="{{ url_for('static', filename='assets/icons/add.svg')}}">
</button>

<button type="button" onclick="guardarValidacion()" class="btn-guardar">
    Guardar verificación
    <img src="{{ url_for('static', filename='assets/icons/save.svg')}}">
</button>

<button type="button" onclick="irAValidarCodigos()" class="btn-validar">
    Verificar Códigos de Ética
    <img src="{{ url_for('static', filename='assets/icons/arrow_forward.svg')}}">
</button>

<script>

/* =======================
   ESTADO
======================= */
let filasOriginales = {};
let poderActivo = 'TODOS';
let hayCambiosPendientes = false;
let paginaActual = 1;
let porPagina = 10;

/* =======================
   CARGA INICIAL (bootstrap)
======================= */
Loader.show("Cargando instituciones...");
fetch('/bootstrap-instituciones')
    .then(r => r.json())
    .then(boot => {

        const data        = boot.instituciones.data;
        const confirmados = boot.confirmados;
        const estatus     = boot.estatus;

        const formulario = document.getElementById('formulario-dinamico');

        (data || []).forEach(fila => {
            const normalizada = {
                id:            fila.id,
                nombre:        fila.nombre || '',
                poderGobierno: fila.poderGobierno || fila.poder_gobierno || '',
                confirmado:    fila.confirmado || false,
            };
            filasOriginales[normalizada.id] = normalizada;
            crearFila(normalizada, formulario);
        });

        // Restaurar confirmados
        document.querySelectorAll('.form-group').forEach(div => {
            if (confirmados.includes(div.dataset.nombre)) {
                div.dataset.confirmado = "true";
                div.classList.add('confirmado');
                div.querySelector('input').readOnly = true;
            }
        });
        hayCambiosPendientes = false;

        filtrar('TODOS');

        // Aplicar estatus códigos
        document.querySelectorAll('.form-group').forEach(div => {
            const normalizado = div.dataset.nombre
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .replace(/\s+/g, "_");
            const badge = div.querySelector('.badge');
            if (estatus.includes(normalizado)) {
                badge.textContent = "Código Validado";
                badge.classList.remove("pendiente");
                badge.classList.add("validado");
            }
        });

        // Verificar cierre
        if (boot.cerrado) {
            document.querySelectorAll('.form-group input').forEach(i => i.disabled = true);
            document.querySelectorAll('.form-group button').forEach(b => b.disabled = true);
            document.querySelectorAll('button').forEach(b => {
                if (b.textContent.trim().startsWith('Volver')) return;
                if (b.textContent.trim().startsWith('Descargar')) return;
                b.disabled = true;
            });
            const aviso = document.createElement('div');
            aviso.className = 'aviso-cerrado';
            aviso.textContent = '⚠ Este proceso ya fue enviado y está cerrado. No es posible realizar modificaciones.';
            document.querySelector('.inst-container').prepend(aviso);
        }
    })
    .catch(err => console.error('Bootstrap error:', err))
    .finally(() => Loader.hide());

/* =======================
   CREAR FILA
======================= */
function crearFila(fila, formulario, esNueva = false) {

    const div = document.createElement('div');
    div.className = 'form-group';
    div.dataset.id     = fila.id;
    div.dataset.poder  = fila.poderGobierno;
    div.dataset.nombre = fila.nombre;
    div.dataset.confirmado = "false";

    const nombreSeguro = fila.nombre.replace(/"/g, '&quot;');

    div.innerHTML = `
        <p>
            <strong>Estatus:</strong>
            <span class="badge pendiente">Pendiente de verificación</span>
        </p>

        <p>¿Este ente público se encuentra obligado a
        <b>EMITIR</b> un Código de Ética según el Art. 16 de la LGRA?</p>

        <input type="text" value="${nombreSeguro}" ${!esNueva ? 'readonly' : ''}>
        <br>

        <button type="button">Editar</button>
        <button type="button">Confirmar</button>
        <button type="button" style="background:#9B2247;color:white;">Eliminar</button>
    `;

    const [input, btnEditar, btnConfirmar, btnEliminar] =
        div.querySelectorAll('input, button');

    input.oninput = () => {
        filasOriginales[fila.id].nombre = input.value;
        div.dataset.nombre = input.value;
        hayCambiosPendientes = true;
    };

    btnEditar.onclick = () => {
        input.readOnly = false;
        div.dataset.confirmado = "false";
        div.classList.remove('confirmado');
        hayCambiosPendientes = true;
    };

    btnConfirmar.onclick = () => {
        input.readOnly = true;
        div.dataset.confirmado = "true";
        div.classList.add('confirmado');
        hayCambiosPendientes = true;
    };

    btnEliminar.onclick = () => {
        delete filasOriginales[fila.id];
        div.remove();
        hayCambiosPendientes = true;
    };

    formulario.appendChild(div);
}




/* =======================
   FILTRADO
   Actualiza la pestaña activa y delega a renderPagina.
======================= */
function filtrar(poder) {
    poderActivo = poder;
    paginaActual = 1;

    const tabs = document.getElementById('tabs');
    tabs.querySelectorAll('button').forEach(btn => btn.classList.remove('activo'));
    const botonActivo = tabs.querySelector(`[data-poder="${poder}"]`);
    if (botonActivo) botonActivo.classList.add('activo');

    renderPagina();
}

/* =======================
   BÚSQUEDA (llamada desde oninput del buscador)
======================= */
function aplicarFiltros() {
    paginaActual = 1;
    renderPagina();
}

/* =======================
   PAGINACIÓN
   Única función que decide qué cards son visibles.
   Combina filtro de poder + texto de búsqueda.
======================= */
function renderPagina() {
    const query = ((document.getElementById('buscador') || {}).value || '')
        .normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();

    const todas     = Array.from(document.querySelectorAll('.form-group'));
    const coinciden = todas.filter(div => {
        const coincidePoder    = poderActivo === 'TODOS' || div.dataset.poder === poderActivo;
        const nombreNorm       = (div.dataset.nombre || '').normalize('NFD')
                                  .replace(/[̀-ͯ]/g, '').toLowerCase();
        const coincideBusqueda = !query || nombreNorm.includes(query);
        return coincidePoder && coincideBusqueda;
    });

    const total       = coinciden.length;
    const totalPags   = porPagina >= 9999 ? 1 : Math.max(1, Math.ceil(total / porPagina));
    if (paginaActual > totalPags) paginaActual = totalPags;

    const inicio   = (paginaActual - 1) * porPagina;
    const fin      = porPagina >= 9999 ? total : inicio + porPagina;
    const enPagina = new Set(coinciden.slice(inicio, fin));

    todas.forEach(div => { div.style.display = enPagina.has(div) ? 'block' : 'none'; });

    // Controles de paginación
    const paginacion = document.getElementById('paginacion');
    paginacion.style.display = 'flex';

    document.getElementById('btn-anterior').disabled  = paginaActual <= 1;
    document.getElementById('btn-siguiente').disabled = paginaActual >= totalPags;

    const desde = total === 0 ? 0 : inicio + 1;
    const hasta  = Math.min(fin, total);
    document.getElementById('paginacion-info').textContent =
        total === 0
            ? 'Sin resultados'
            : `${desde}–${hasta} de ${total} institución${total !== 1 ? 'es' : ''}`;

    // Contador del buscador
    const contador = document.getElementById('buscador-contador');
    if (contador) {
        if (query) {
            contador.textContent  = `${total} resultado${total !== 1 ? 's' : ''}`;
            contador.style.display = 'inline';
        } else {
            contador.style.display = 'none';
        }
    }
}

function cambiarPagina(delta) {
    paginaActual += delta;
    renderPagina();
    document.getElementById('tabs').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function cambiarPorPagina() {
    porPagina    = parseInt(document.getElementById('por-pagina').value);
    paginaActual = 1;
    renderPagina();
}

/* =======================
   NUEVA ENTRADA
======================= */
function agregarEntrada() {
    if (poderActivo === 'TODOS') {
        alert('Selecciona primero un tipo de poder');
        return;
    }

    const nuevoId = 'nuevo_' + Date.now();
    const fila = { id: nuevoId, nombre: '', poderGobierno: poderActivo };

    filasOriginales[nuevoId] = fila;
    crearFila(fila, document.getElementById('formulario-dinamico'), true);
    hayCambiosPendientes = true;

    // Ir a la última página del filtro activo, donde quedó la nueva fila
    const coinciden = Array.from(document.querySelectorAll('.form-group'))
        .filter(div => div.dataset.poder === poderActivo);
    const totalPags = porPagina >= 9999 ? 1 : Math.max(1, Math.ceil(coinciden.length / porPagina));
    paginaActual = totalPags;

    renderPagina();

    // Enfocar el input para que el usuario escriba de inmediato
    const nuevaFila = document.querySelector(`.form-group[data-id="${nuevoId}"]`);
    if (nuevaFila) {
        nuevaFila.querySelector('input').focus();
        nuevaFila.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

/* =======================
   GUARDAR
======================= */
function guardarValidacion() {

    const confirmados = [];

    document.querySelectorAll('.form-group').forEach(div => {
        if (div.dataset.confirmado !== "true") return;

        const fila = filasOriginales[div.dataset.id];
        if (!fila) return;

        confirmados.push({
            id:            fila.id,
            nombre:        div.querySelector('input').value,
            poderGobierno: fila.poderGobierno,
        });
    });

    if (!confirmados.length) {
        alert('No hay registros confirmados');
        return;
    }

    Loader.show("Guardando verificación...");
    fetch('/guardar-validacion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filas: confirmados })
    })
    .then(r => r.json())
    .then(() => {
        hayCambiosPendientes = false;
        alert('Información guardada correctamente');
    })
    .catch(() => alert('Error al guardar'))
    .finally(() => Loader.hide());
}

/* =======================
   NAVEGACIÓN
======================= */
function irAValidarCodigos() {
    if (hayCambiosPendientes) {
        alert('Guarda la información antes de continuar');
        return;
    }

    Loader.show("Verificando entes confirmados...");
    fetch('/hay-entes-confirmados')
        .then(r => r.json())
        .then(resp => {
            if (!resp.hay) {
                alert('Primero confirma al menos una institución');
                Loader.hide();
                return;
            }
            window.location.href = '/validar-codigos';
        })
        .catch(() => Loader.hide());
}
</script>

</div>
{% endblock %}
